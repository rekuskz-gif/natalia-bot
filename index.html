<script>

const TG_TOKEN="8715209750:AAH4-blEgXPZpeYXii8IeWLX0wdbGWtANQc";
const TG_CHAT="376719975";

const SYS="Тебя зовут Наталия. Ты эксперт по интернет-рекламе, SEO и продвижению бизнеса. Ты работаешь в компании seokazmarket.kz. Отвечай на русском языке. Давай конкретные персональные рекомендации. Будь профессиональной но дружелюбной. В конце всегда предлагай записаться на консультацию.";

let history=[];
let loading=false;
let quiz=null;

function getParams(){
  const p=new URLSearchParams(window.location.search);

  const k={
  budget:"Бюджет",
  clients:"Как находят",
  result:"Срок",
  check:"Средний чек",
  leads:"Заявок",
  audience:"Аудитория",
  geo:"География",
  tasks:"Задачи",
  competitors:"Конкуренты",
  advantage:"Преимущество",
  services:"Услуги"
  };

  let s="";

  for(const i in k){
    const v=p.get(i);
    if(v)s+=`• ${k[i]}: ${decodeURIComponent(v)}\n`;
  }

  return s;
}

function addMsg(role,text){

  const m=document.getElementById("messages");

  const d=document.createElement("div");
  d.className="message "+role;

  const b=document.createElement("div");
  b.className="bubble";
  b.textContent=text;

  d.appendChild(b);

  m.appendChild(d);

  m.scrollTop=m.scrollHeight;
}

function showTyping(){

  const m=document.getElementById("messages");

  const d=document.createElement("div");

  d.className="message assistant";

  d.id="typing";

  d.innerHTML='<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';

  m.appendChild(d);

  m.scrollTop=m.scrollHeight;
}

function hideTyping(){

  const t=document.getElementById("typing");

  if(t)t.remove();
}

async function tg(text){

  try{

  await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`,{

  method:"POST",

  headers:{"Content-Type":"application/json"},

  body:JSON.stringify({

  chat_id:TG_CHAT,

  text:text

  })

  });

  }catch(e){

  console.log("telegram error");

  }

}

async function ask(sys,msg){

  history.push({role:"user",content:msg});

  try{

    const r=await fetch("/api/chat",{

      method:"POST",

      headers:{

      "Content-Type":"application/json"

      },

      body:JSON.stringify({

        model:"openai/gpt-4o-mini",

        max_tokens:1500,

        messages:[

        {role:"system",content:sys},

        ...history

        ]

      })

    });

    if(!r.ok){

      throw new Error("API error");

    }

    const data=await r.json();

    const reply=data.choices?.[0]?.message?.content || "Ошибка ответа AI";

    history.push({

    role:"assistant",

    content:reply

    });

    hideTyping();

    addMsg("assistant",reply);

    tg(`💬 Диалог:\n\n👤 ${msg}\n\n🤖 ${reply}`);

  }

  catch(e){

    hideTyping();

    addMsg("assistant","Ошибка соединения 😔");

    console.error(e);

  }

  loading=false;

  document.getElementById("sendBtn").disabled=false;

  document.getElementById("input").focus();
}

window.sendMessage=async function(){

  const inp=document.getElementById("input");

  const text=inp.value.trim();

  if(!text||loading)return;

  loading=true;

  document.getElementById("sendBtn").disabled=true;

  inp.value="";

  addMsg("user",text);

  showTyping();

  await ask(

  quiz?SYS+"\n\nДАННЫЕ КЛИЕНТА:\n"+quiz:SYS,

  text

  );

}

document.getElementById("input").addEventListener("keydown",e=>{

  if(e.key==="Enter"&&!e.shiftKey){

  e.preventDefault();

  sendMessage();

  }

});

const s=getParams();

if(s){

  quiz=s;

  tg("📋 Новая заявка с квиза:\n\n"+s);

  addMsg("assistant","Привет! Меня зовут Наталия 👋\n\nПолучила ваши ответы из квиза. Анализирую...");

  showTyping();

  setTimeout(()=>ask(

  SYS+"\n\nДАННЫЕ КЛИЕНТА:\n"+s,

  "Проанализируй ответы и дай персональные рекомендации."

  ),800);

}

else{

  addMsg("assistant","Привет! Меня зовут Наталия 👋\n\nЯ эксперт по рекламе и SEO в seokazmarket.kz. Чем могу помочь?");

}

</script>
