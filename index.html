<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Наталия — SEO эксперт</title>

<style>
body{
font-family:Arial;
background:#111;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0
}

.chat{
width:600px;
background:#1e1e1e;
border-radius:10px;
display:flex;
flex-direction:column;
height:80vh
}

.messages{
flex:1;
padding:20px;
overflow-y:auto
}

.msg{
margin-bottom:12px;
padding:10px 14px;
border-radius:8px;
max-width:80%
}

.user{
background:#4f46e5;
align-self:flex-end
}

.bot{
background:#333
}

.input{
display:flex;
border-top:1px solid #333
}

input{
flex:1;
padding:14px;
border:none;
background:#222;
color:#fff
}

button{
width:100px;
background:#4f46e5;
border:none;
color:#fff;
cursor:pointer
}
</style>
</head>

<body>

<div class="chat">

<div class="messages" id="messages"></div>

<div class="input">
<input id="input" placeholder="Напишите сообщение">
<button onclick="send()">Отправить</button>
</div>

</div>

<script>

const SYS="Ты Наталия — SEO эксперт. Помогаешь бизнесу продвигаться."

let history=[]
let quiz=null

function msg(role,text){

const m=document.getElementById("messages")

const d=document.createElement("div")

d.className="msg "+(role==="user"?"user":"bot")

d.textContent=text

m.appendChild(d)

m.scrollTop=m.scrollHeight

}

async function ask(text){

history.push({role:"user",content:text})

const r=await fetch("/api/chat",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

model:"openai/gpt-4o-mini",

messages:[
{role:"system",content:SYS},
...history
]

})

})

const data=await r.json()

const reply=data.choices?.[0]?.message?.content || "Ошибка"

history.push({role:"assistant",content:reply})

msg("bot",reply)

}

async function send(){

const i=document.getElementById("input")

const text=i.value.trim()

if(!text)return

i.value=""

msg("user",text)

await ask(text)

}

async function loadQuiz(){

try{

const r=await fetch("/api/quiz")

const data=await r.json()

if(data.quiz){

const q=data.quiz

quiz=`
Клиенты приходят: ${q.clients}
Средний чек: ${q.check}
`

msg("bot","Получила ваши ответы из квиза 👋")

msg("bot",quiz)

await ask("Проанализируй ответы клиента и предложи стратегию продвижения")

return

}

}catch(e){}

msg("bot","Привет! Я Наталия — SEO эксперт. Чем могу помочь?")

}

loadQuiz()

</script>

</body>
</html>
