```html
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Наталия — SEO эксперт</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.chat{
width:680px;
max-width:95%;
height:85vh;
background:rgba(255,255,255,0.05);
border-radius:18px;
display:flex;
flex-direction:column;
overflow:hidden;
backdrop-filter:blur(15px);
}

.header{
padding:18px;
border-bottom:1px solid rgba(255,255,255,0.1);
display:flex;
gap:12px;
align-items:center;
}

.avatar{
width:42px;
height:42px;
border-radius:50%;
background:#7c3aed;
}

.title{
font-weight:bold;
}

.messages{
flex:1;
padding:20px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:14px;
}

.msg{
max-width:75%;
padding:12px 16px;
border-radius:14px;
line-height:1.5;
white-space:pre-wrap;
}

.bot{
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.1);
}

.user{
align-self:flex-end;
background:#7c3aed;
}

border-top:1px solid rgba(255,255,255,0.1);

}

textarea{
flex:1;

color:white;

outline:none;
}

button{
width:90px;
background:#7c3aed;
border:none;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div class="chat">

<div class="header">
<div class="avatar"></div>
<div>
<div class="title">Наталия</div>
<div style="font-size:12px;color:#a78bfa">SEO эксперт</div>
</div>
</div>

<div id="messages" class="messages"></div>

<div class="input">
<textarea id="input" placeholder="Напишите сообщение..."></textarea>
<button onclick="send()">Отправить</button>
</div>

</div>

<script>

const TG_TOKEN="ВАШ_ТОКЕН"
const TG_CHAT="ВАШ_CHAT_ID"

const SYS="Ты Наталия — SEO эксперт. Дай рекомендации по продвижению бизнеса."

let history=[]
let quizText=""

function msg(role,text){

const m=document.getElementById("messages")

const d=document.createElement("div")
d.className="msg "+(role==="user"?"user":"bot")
d.textContent=text

m.appendChild(d)

m.scrollTop=m.scrollHeight

}

async function tg(text){

try{

await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
chat_id:TG_CHAT,
text:text
})
})

}catch(e){}

}

async function ask(text){

history.push({role:"user",content:text})

const r=await fetch("/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
model:"openai/gpt-4o-mini",
messages:[
{role:"system",content:SYS+"\n\nДАННЫЕ КЛИЕНТА:\n"+quizText},
...history
]
})
})

const data=await r.json()

const reply=data.choices?.[0]?.message?.content || "Ошибка"

history.push({role:"assistant",content:reply})

msg("bot",reply)

tg("Диалог:\n\n"+text+"\n\n"+reply)

}

async function send(){

const i=document.getElementById("input")

const text=i.value.trim()

if(!text)return

i.value=""

msg("user",text)

await ask(text)

}

async function loadQuiz(){

const params=new URLSearchParams(window.location.search)
const id=params.get("id")

if(!id){

msg("bot","Привет! Я Наталия 👋\nЧем могу помочь вашему бизнесу?")

return

}

try{

const r=await fetch("/api/quiz?id="+id)
const data=await r.json()

const q=data.quiz

quizText=`
Источник клиентов: ${q.clients}
Средний чек: ${q.check}
`

msg("bot","Спасибо за ответы в квизе 👋")

msg("bot",quizText)

await ask("Сделай анализ бизнеса и предложи стратегию продвижения")

}catch(e){

msg("bot","Привет! Я Наталия 👋\nЧем могу помочь?")

}

}

loadQuiz()

</script>

</body>
</html>
