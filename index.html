<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Наталия</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Georgia,serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.chat{width:100%;max-width:680px;background:rgba(255,255,255,0.05);border-radius:24px;overflow:hidden;display:flex;flex-direction:column;height:85vh}
.header{padding:20px;display:flex;align-items:center;gap:14px;border-bottom:1px solid rgba(255,255,255,0.1)}
.avatar{width:48px;height:48px;border-radius:50%;overflow:hidden;border:2px solid #a78bfa}
.avatar img{width:100%;height:100%;object-fit:cover}
.name{color:white;font-weight:bold;font-size:16px}
.status{color:#a78bfa;font-size:12px}
.messages{flex:1;overflow:auto;padding:20px;display:flex;flex-direction:column;gap:14px}
.msg{max-width:75%;padding:12px 16px;border-radius:16px;color:white;white-space:pre-wrap;line-height:1.6}
.user{align-self:flex-end;background:linear-gradient(135deg,#7c3aed,#4f46e5);border-radius:18px 18px 4px 18px}
.bot{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);border-radius:18px 18px 18px 4px}
.typing{display:flex;gap:6px;align-items:center;padding:14px 16px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);border-radius:18px 18px 18px 4px;width:fit-content}
.dot{width:7px;height:7px;border-radius:50%;background:#a78bfa;animation:bounce 1.2s infinite}
.dot:nth-child(2){animation-delay:0.2s}
.dot:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.input{display:flex;gap:10px;padding:16px;border-top:1px solid rgba(255,255,255,0.1)}
textarea{flex:1;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:10px 14px;color:white;font-size:15px;resize:none;outline:none;font-family:inherit;min-height:44px}
textarea::placeholder{color:rgba(255,255,255,0.3)}
button{width:46px;height:46px;border:none;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#4f46e5);color:white;cursor:pointer;font-size:20px;flex-shrink:0}
button:disabled{background:rgba(124,58,237,0.3);cursor:not-allowed}
</style>
</head>
<body>
<div class="chat">
  <div class="header">
    <div class="avatar"><img src="https://cdn-edge.kwork.ru/files/avatar/large/22/17852991-2.jpg" alt="Наталия" onerror="this.style.display='none'"></div>
    <div><div class="name">Наталия</div><div class="status">онлайн</div></div>
  </div>
  <div id="messages" class="messages"></div>
  <div class="input">
    <textarea id="input" rows="1" placeholder="Напишите сообщение..."></textarea>
    <button id="btn" onclick="send()">↑</button>
  </div>
</div>
<script>
const TG_TOKEN = "8715209750:AAH4-blEgXPZpeYXii8IeWLX0wdbGWtANQc";
const TG_CHAT = "376719975";

const SYS = "Ты — Наталия, эксперт по лидогенерации для производителей детских площадок. 10 лет опыта. Живая, теплая, уверенная. Никогда не говори что ты ИИ. Пиши коротко — максимум 5-6 строк за раз. Отвечай только на русском языке.\n\nКОМПЛИМЕНТЫ — используй в диалоге:\n- [name], вы дошли до конца — это говорит о серьезности\n- Отличный регион! Рынок там растет, конкуренция низкая\n- Такой чек — серьезный бизнес, квиз окупается с первой заявки\n- Амбициозная цель! Такие предприниматели добиваются результата\n- Хорошо что признаете проблему — половина отрицают\n- Отличный вопрос! Именно так мыслят успешные предприниматели\n- То что пробовали — это опыт. Теперь сделаем правильно\n- Вы быстро соображаете — с такими приятно работать\n\nПЕРВОЕ СООБЩЕНИЕ — строго по структуре:\n1. Обратись по имени + комплимент за квиз\n2. ВАУ-РАСЧЕТ: Сейчас [leads] заявок x [check] = XXX р/мес. Хотите [result] x [check] = XXX р/мес. Теряете XXX р каждый месяц\n3. Боль [tasks]: Мало заявок — квиз-воронка за 7 дней. Дорогие — квиз отсеивает нецелевых. Плохо закрываем — дам скрипт. Регионы — покажу как зайти\n4. План: 1. Квиз под [clients] 7 дней 2. РСЯ в [geo] от 150р 3. Результат через 30 дней\n5. Один вопрос для диалога\n\nПРАВИЛА:\n- Всегда по имени\n- Каждые 2-3 сообщения комплимент\n- Один вопрос за раз\n- Цифры и конкретика\n- Веди к созвону на 15 минут\n- Не проси данных — работай с тем что есть\n\nЗАПРЕЩЕНО: длинные тексты, общие фразы, я не знаю, называть конкурентов";

let history = [], loading = false, clientName = "";

function add(role, text) {
  const m = document.getElementById("messages");
  const d = document.createElement("div");
  d.className = "msg " + role;
  d.innerText = text;
  m.appendChild(d);
  m.scrollTop = m.scrollHeight;
}

function showTyping() {
  const m = document.getElementById("messages");
  const d = document.createElement("div");
  d.id = "typing";
  d.innerHTML = '<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  m.appendChild(d);
  m.scrollTop = m.scrollHeight;
}

function hideTyping() {
  const t = document.getElementById("typing");
  if (t) t.remove();
}

async function sendTG(text) {
  try {
    await fetch("https://api.telegram.org/bot" + TG_TOKEN + "/sendMessage", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({chat_id: TG_CHAT, text: text})
    });
  } catch(e) {}
}

async function ask(msg, sys) {
  history.push({role: "user", content: msg});
  showTyping();
  try {
    const r = await fetch("https://natalia-bot.vercel.app/api/chat", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        model: "openai/gpt-4o-mini",
        max_tokens: 1500,
        messages: [{role: "system", content: sys || SYS}, ...history]
      })
    });
    const data = await r.json();
    const reply = data.choices?.[0]?.message?.content || "Что-то пошло не так...";
    history.push({role: "assistant", content: reply});
    hideTyping();
    add("bot", reply);
    sendTG("Клиент: " + (clientName || "неизвестен") + "\n\nВопрос: " + msg + "\n\nНаталия: " + reply);
  } catch(e) {
    hideTyping();
    add("bot", "Ошибка соединения. Попробуйте еще раз.");
  }
  loading = false;
  document.getElementById("btn").disabled = false;
}

async function send() {
  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text || loading) return;
  loading = true;
  document.getElementById("btn").disabled = true;
  input.value = "";
  add("user", text);
  await ask(text);
}

document.getElementById("input").addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});

async function init() {
  const p = new URLSearchParams(window.location.search);
  const id = p.get("id");
  if (id) {
    add("bot", "Привет! Меня зовут Наталия!\n\nЗагружаю ваши данные...");
    showTyping();
    try {
      const r = await fetch("https://natalia-bot.vercel.app/api/quiz?id=" + id);
      const data = await r.json();
      hideTyping();
      if (data.quiz) {
        const q = data.quiz;
        clientName = q.name || "";
        const checkMap = {"до 100 000 р":100000,"100 000 — 500 000 р":300000,"500 000 — 1 000 000 р":750000,"более 1 000 000 р":1000000};
        const leadsMap = {"0-5 (почти нет)":3,"5-20 (маловато)":12,"20-50 (неплохо)":35,"50+ (хочу больше)":50};
        const resultMap = {"20-50 заявок":35,"50-100 заявок":75,"100-200 заявок":150,"200+ заявок":200};
        const checkNum = checkMap[q.check] || 300000;
        const leadsNum = leadsMap[q.leads] || 5;
        const resultNum = resultMap[q.result] || 50;
        const losses = (resultNum - leadsNum) * checkNum;
        const userMsg = "Клиент заполнил квиз. Данные:\n\n" +
          "Имя: " + (q.name || "не указано") + "\n" +
          "Тип клиентов: " + (q.clients || "не указано") + "\n" +
          "Заявок сейчас: " + (q.leads || "не указано") + "\n" +
          "Средний чек: " + (q.check || "не указано") + "\n" +
          "Главная боль: " + (q.tasks || "не указано") + "\n" +
          "Хочет заявок: " + (q.result || "не указано") + "\n" +
          "Регион: " + (q.geo || "не указано") + "\n" +
          "Телефон: " + (q.phone || "не указано") + "\n" +
          "Потери в месяц: " + losses.toLocaleString("ru") + " р\n\n" +
          "Обратись по имени. Сделай ВАУ-расчет потерь. Попади в боль. Дай конкретный план. Не проси данных.";
        await ask(userMsg, SYS);
      } else {
        add("bot", "Привет! Я Наталия.\n\nЧем могу помочь?");
      }
    } catch(e) {
      hideTyping();
      add("bot", "Привет! Я Наталия.\n\nЧем могу помочь?");
    }
  } else {
    add("bot", "Привет! Меня зовут Наталия!\n\nЯ эксперт по лидогенерации для производителей детских площадок.\n\nПройдите квиз — получите персональный план продаж.");
  }
}

init();
</script>
</body>
</html>
